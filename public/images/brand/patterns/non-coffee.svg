<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" fill="none">
  <g stroke="#65845b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Tea leaf (top-left) -->
    <g transform="translate(45 45) rotate(-30)">
      <path d="M 0 -22 q 16 12 0 44 q -16 -12 0 -44 z"/>
      <path d="M 0 -18 L 0 18"/>
    </g>
    <!-- Lemon slice (top-right) -->
    <g transform="translate(170 45)">
      <circle cx="0" cy="0" r="18"/>
      <circle cx="0" cy="0" r="12"/>
      <line x1="0" y1="-12" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="12" y2="0"/>
      <line x1="-8.5" y1="-8.5" x2="8.5" y2="8.5"/>
      <line x1="-8.5" y1="8.5" x2="8.5" y2="-8.5"/>
    </g>
    <!-- Berry cluster (middle-left) -->
    <g transform="translate(45 120)">
      <circle cx="0" cy="0" r="7"/>
      <circle cx="12" cy="-3" r="6"/>
      <circle cx="6" cy="11" r="6"/>
    </g>
    <!-- Sparkle (center) -->
    <g transform="translate(120 120)">
      <path d="M 0 -10 L 2 -2 L 10 0 L 2 2 L 0 10 L -2 2 L -10 0 L -2 -2 Z"/>
    </g>
    <!-- Tea leaf (middle-right) -->
    <g transform="translate(195 130) rotate(40)">
      <path d="M 0 -18 q 14 10 0 36 q -14 -10 0 -36 z"/>
      <path d="M 0 -15 L 0 15"/>
    </g>
    <!-- Small berries (bottom-left) -->
    <g transform="translate(80 195)">
      <circle cx="0" cy="0" r="6"/>
      <circle cx="10" cy="3" r="5"/>
    </g>
    <!-- Lemon (bottom-center) -->
    <g transform="translate(140 200)">
      <circle cx="0" cy="0" r="14"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
      <line x1="-10" y1="0" x2="10" y2="0"/>
    </g>
    <!-- Tea leaf small (bottom-right) -->
    <g transform="translate(200 200) rotate(-20)">
      <path d="M 0 -14 q 11 8 0 28 q -11 -8 0 -28 z"/>
      <path d="M 0 -11 L 0 11"/>
    </g>
    <!-- Tiny sparkles -->
    <circle cx="100" cy="60" r="2" fill="#65845b" stroke="none"/>
    <circle cx="180" cy="100" r="2" fill="#65845b" stroke="none"/>
    <circle cx="60" cy="165" r="2" fill="#65845b" stroke="none"/>
  </g>
</svg>
