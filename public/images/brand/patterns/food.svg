<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" fill="none">
  <g stroke="#65845b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Rice bowl (top-left) -->
    <g transform="translate(45 45)">
      <path d="M -22 -4 q 22 18 44 0 l -6 18 q -16 8 -32 0 z"/>
      <path d="M -22 -4 q 22 -6 44 0"/>
      <!-- rice dots -->
      <circle cx="-10" cy="2" r="1.5" fill="#65845b" stroke="none"/>
      <circle cx="0" cy="-2" r="1.5" fill="#65845b" stroke="none"/>
      <circle cx="10" cy="2" r="1.5" fill="#65845b" stroke="none"/>
    </g>
    <!-- Croffle / waffle grid (top-right) -->
    <g transform="translate(170 42)">
      <rect x="-18" y="-14" width="36" height="28" rx="3"/>
      <line x1="-6" y1="-14" x2="-6" y2="14"/>
      <line x1="6" y1="-14" x2="6" y2="14"/>
      <line x1="-18" y1="-4" x2="18" y2="-4"/>
      <line x1="-18" y1="6" x2="18" y2="6"/>
    </g>
    <!-- Fork (middle-left) -->
    <g transform="translate(40 120)">
      <line x1="0" y1="-18" x2="0" y2="14"/>
      <line x1="-6" y1="-18" x2="-6" y2="-8"/>
      <line x1="-3" y1="-18" x2="-3" y2="-8"/>
      <line x1="3" y1="-18" x2="3" y2="-8"/>
      <line x1="6" y1="-18" x2="6" y2="-8"/>
    </g>
    <!-- Sandwich (center) -->
    <g transform="translate(118 120)">
      <path d="M -18 6 q 18 -12 36 0 l -2 8 q -16 8 -32 0 z"/>
      <line x1="-15" y1="2" x2="15" y2="2"/>
      <path d="M -16 -4 q 16 -10 32 0"/>
    </g>
    <!-- Plate (middle-right) -->
    <g transform="translate(195 130)">
      <circle cx="0" cy="0" r="20"/>
      <circle cx="0" cy="0" r="14"/>
    </g>
    <!-- Rice bowl small (bottom-left) -->
    <g transform="translate(60 200)">
      <path d="M -16 -2 q 16 13 32 0 l -5 14 q -11 6 -22 0 z"/>
      <path d="M -16 -2 q 16 -5 32 0"/>
    </g>
    <!-- Croffle (bottom-center) -->
    <g transform="translate(135 200)">
      <rect x="-14" y="-10" width="28" height="22" rx="2"/>
      <line x1="-4" y1="-10" x2="-4" y2="12"/>
      <line x1="6" y1="-10" x2="6" y2="12"/>
      <line x1="-14" y1="-2" x2="14" y2="-2"/>
      <line x1="-14" y1="6" x2="14" y2="6"/>
    </g>
    <!-- Fork (bottom-right) -->
    <g transform="translate(200 198)">
      <line x1="0" y1="-16" x2="0" y2="12"/>
      <line x1="-5" y1="-16" x2="-5" y2="-8"/>
      <line x1="-2" y1="-16" x2="-2" y2="-8"/>
      <line x1="2" y1="-16" x2="2" y2="-8"/>
      <line x1="5" y1="-16" x2="5" y2="-8"/>
    </g>
  </g>
</svg>
